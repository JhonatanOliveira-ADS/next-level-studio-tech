<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Next Level Studio Tech</title>

<style>

body {
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 10px;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input {
    padding: 10px;
    border-radius: 5px;
    border: none;
    outline: none;
}

button {
    padding: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #ccc;
}

h2 {
    text-align: center;
}

.msg {
    text-align: center;
    font-size: 14px;
    color: lightgreen;
}

</style>

</head>

<body>

<div class="container">

<h2>🧾 Cadastro</h2>

<input type="text" id="nome" placeholder="Nome completo">
<input type="text" id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">
<input type="email" id="email" placeholder="Email">
<input type="tel" id="telefone" placeholder="Telefone">

<button onclick="cadastrar()">Cadastrar</button>

<p class="msg" id="msg"></p>

</div>

<script>

function cadastrar() {

    let nome = document.getElementById("nome").value;
    let usuario = document.getElementById("usuario").value;
    let senha = document.getElementById("senha").value;
    let email = document.getElementById("email").value;
    let telefone = document.getElementById("telefone").value;

    if (!nome || !usuario || !senha || !email || !telefone) {
        document.getElementById("msg").innerText = "Preencha todos os campos!";
        return;
    }

    let usuarioData = {
        nome,
        usuario,
        senha,
        email,
        telefone
    };

    // 💾 salvar no navegador
    localStorage.setItem("usuario", JSON.stringify(usuarioData));

    document.getElementById("msg").innerText = "Cadastro realizado com sucesso!";
}

</script>

</body>
</html>
